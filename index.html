<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="stylesheet" href="css\index.css" />
    <link rel="stylesheet" href="css\custom.css" />
    <link rel="shortcut icon" href="img\calcicon.png" type="image/x-icon" />
  </head>
  <body id="body" class="padrao">
    <div id="content">
      <!--Corpo da Calculadora-->

      <div id="calcbody">
        <div>
          <div id="resul" class="resul">
            <p id="resuloutput"></p>
            <div id="bar"></div>
          </div>

          <input
            type="number"
            id="numI"
            value="0"
            onchange="onchge()"
            autocomplete="off"
          />
          <input
            type="number"
            id="numII"
            value="0"
            onchange="onchge()"
            autocomplete="off"
          />
          <br />
          <label for="numI" id="label_input1" class="labelinput"></label>
          <label for="numII" id="label_input2" class="labelinput"></label>
          <br />
          <div id="buttonbody">
            <div id="filabotao1" class="filabotao">
              <button class="graybutton" onclick="adiciona()" id="Adicionar">
                <span class="spanbutton">+</span>
              </button>
              <!--Botão de adicionar-->
              <button class="graybutton" onclick="subtra()" id="Subtrair">
                <span class="spanbutton">-</span>
              </button>
              <!--Botão de subtrair-->
              <button class="graybutton" onclick="multi()" id="Multiplicar">
                <span class="spanbutton">x</span>
              </button>
              <!--Botão de multiplicar-->
              <button class="graybutton" onclick="divid()" id="Dividir">
                <span class="spanbutton">:</span>
              </button>
              <!--Botão de dividir-->
            </div>
            <div id="filabotao2" class="filabotao">
              <button class="graybutton" onclick="media()" id="media">
                <span class="spanbutton">Média</span>
              </button>
              <!--Botão de média-->
              <button class="graybutton" onclick="potencia()" id="potencia">
                <span class="spanbutton">y^x</span>
              </button>
              <!--Botão de potência-->
              <button class="graybutton" onclick="porcent()" id="porcent">
                <span class="spanbutton">%</span>
              </button>
              <!--Botão de porcentagem-->
              <button class="graybutton" onclick="raiz()" id="raiz">
                <span class="spanbutton">√x</span>
              </button>
              <!--Botão de raíz-->
            </div>
            <div id="filabotao3" class="filabotao">
              <button onclick="trocar()" id="troca">Trocar</button>
              <!--Botão de trocar-->
              <button onclick="limpar()" id="limpar">Limpar</button>
              <!--Botão de limpar-->
            </div>
          </div>

          <script src="js\index.js"></script>
          <script src="js\custom.js"></script>
        </div>
      </div>
      <!--Fim do corpo da Calculadora-->

      <div id="informacoes"></div>
      <!--Aba das informações-->
    </div>
  </body>
</html>
